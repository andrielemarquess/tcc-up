<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TCC UPP</title>
<link rel="stylesheet" href="style.css">
<style>
/* --- Estilos principais (mantidos do seu projeto) --- */
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f2f2;
}
header{
    background:#4CAF50;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header h1{ font-size:28px; margin:0; }
nav button{
    margin-left:10px;
    padding:8px 14px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:white;
    color:#4CAF50;
    font-weight:bold;
}
nav button:hover{ background:#e6e6e6; }

.container-principal{
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    opacity:1;
    transition:opacity 0.5s;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
    height:380px;
    display:flex;
    flex-direction:column;
}
.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}
.card h3{ font-size:18px; font-weight:bold; color:#333; margin-bottom:5px; }
.card p{ color:#666; font-size:14px; margin:2px 0; }
.card img{ width:100%; height:120px; object-fit:cover; margin-bottom:10px; border-radius:5px; }
.card .keywords{ font-size:12px; color:#999; margin-bottom:5px; }
.card .btn-download{
    background:#4CAF50;
    color:white;
    padding:8px 16px;
    text-align:center;
    border-radius:5px;
    text-decoration:none;
    font-weight:bold;
    margin-top:auto;
}
.card .btn-download:hover{ background:#45a049; }

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
}
.modal-content{
    background:white;
    padding:25px;
    border-radius:10px;
    width:90%;
    max-width:500px;
    max-height:90%;
    overflow-y:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}
.fechar{
    float:right;
    cursor:pointer;
    font-weight:bold;
}

.form-container{
    display:none;
    padding:30px;
    max-width:400px;
    margin:30px auto;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    opacity: 0;
    transition: opacity 0.5s;
}
.form-container.show{ display:block; opacity:1; }
.form-container h1{ text-align:center; color:#4CAF50; }
label{ font-weight:bold; }
input, textarea, select{ width:100%; padding:8px; margin-top:5px; margin-bottom:15px; }
button.submit-btn{ width:100%; padding:10px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; }
button.submit-btn:hover{ background:#45a049; }
.voltar{text-align:center; margin-top:15px;}
.voltar a{text-decoration:none; color:#4CAF50; }
.radio-group{ display:flex; gap:20px; margin-bottom:15px; }
.radio-group label{ font-weight:normal; }
</style>
</head>
<body>

<header>
<h1>TCC UPP</h1>
<nav>
<button onclick="mostrarPagina('registro')">Registre-se</button>
<button onclick="mostrarPagina('publicar')">Publique</button>
<button onclick="mostrarPagina('login')">Login</button>
</nav>
</header>

<!-- Página Inicial (cards serão carregados dinamicamente) -->
<div id="home" class="container-principal"></div>

<!-- Cadastro -->
<div id="registro" class="form-container">
<h1>Registre-se</h1>
<form>
    <label>Nome:</label>
    <input type="text" name="nome" required>
    <label>Data de Nascimento:</label>
    <input type="date" name="data_nascimento" required>
    <label>Matrícula:</label>
    <input type="text" name="matricula" required>
    <div class="radio-group">
        <div>
            <input type="radio" id="aluno" name="tipo_usuario" onclick="exibirCamposAluno()" required>
            <label for="aluno">Sou Aluno</label>
        </div>
        <div>
            <input type="radio" id="orientador" name="tipo_usuario" onclick="exibirCamposOrientador()" required>
            <label for="orientador">Sou Orientador</label>
        </div>
    </div>
    <div id="camposAluno" style="display:none;">
        <label>Curso:</label><input type="text" name="curso">
        <label>Modalidade:</label>
        <select name="modalidade">
            <option value="medio_tecnico">Médio Técnico</option>
            <option value="ensino_superior">Ensino Superior</option>
        </select>
        <label>Turma:</label><input type="text" name="turma">
    </div>
    <div id="camposOrientador" style="display:none;">
        <label>Área de Conhecimento:</label><input type="text" name="area_conhecimento">
        <label>Licenciatura em:</label>
        <select name="licenciatura">
            <option value="medio_tecnico">Médio Técnico</option>
            <option value="ensino_superior">Ensino Superior</option>
        </select>
    </div>
    <button type="submit" class="submit-btn">Registrar</button>
</form>
<div class="voltar"><a href="#" onclick="mostrarPagina('home')">Voltar para a página inicial</a></div>
</div>

<!-- Login -->
<div id="login" class="form-container">
<h1>Login</h1>
<form>
<label>Nome:</label><input type="text" name="nome" required>
<label>Matrícula:</label><input type="text" name="matricula" required>
<label>Senha:</label><input type="password" name="senha" required>
<button type="submit" class="submit-btn">Entrar</button>
</form>
<div class="voltar"><a href="#" onclick="mostrarPagina('home')">Voltar para a página inicial</a></div>
</div>

<!-- Publicar TCC -->
<div id="publicar" class="form-container">
<h1>Publicar TCC</h1>
<form>
<label>Título:</label><input type="text" name="titulo" required>
<label>Autor(a):</label><input type="text" name="autor" required>
<label>Orientador:</label><input type="text" name="orientador">
<label>Área de conhecimento:</label><input type="text" name="area">
<label>Instituição responsável:</label><input type="text" name="instituicao">
<label>Local de publicação:</label><input type="text" name="local">
<label>Data de publicação:</label><input type="date" name="data_publicacao">
<label>Descrição:</label><textarea name="descricao" rows="4"></textarea>
<label>Selecionar arquivo:</label><input type="file" name="arquivo" required>
<button type="submit" class="submit-btn">Publicar</button>
</form>
<div class="voltar"><a href="#" onclick="mostrarPagina('home')">Voltar para a página inicial</a></div>
</div>

<!-- Modal TCC -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="fechar">X</span>
        <h2 id="titulo"></h2>
        <p><b>Descrição:</b> <span id="descricao"></span></p>
        <p><b>Autor:</b> <span id="autor"></span></p>
        <p><b>Orientador:</b> <span id="orientador"></span></p>
        <p><b>Data de publicação:</b> <span id="data"></span></p>
        <p><b>Instituição responsável:</b> <span id="instituicao"></span></p>
    </div>
</div>

<!-- Scripts JS modularizados -->
<script type="module" src="js/main.js"></script>
</body>
</html>
